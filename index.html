<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin: 0;
  background: #f2f2f2;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  text-align: center;
  color: #111;
}

/* TOP LEFT MODE CONTROLS */
#modeControls {
  position: absolute;
  top: 12px;
  left: 16px;
  font-size: 12px;
  opacity: 0.7;
}

/* TOP RIGHT CONTROLS */
#controls {
  position: absolute;
  top: 12px;
  right: 16px;
  font-size: 12px;
  opacity: 0.7;
}

button {
  border: none;
  background: none;
  font-size: 12px;
  margin-left: 10px;
  cursor: pointer;
}

button.active {
  font-weight: 600;
}

#container {
  display: none;
}

#label {
  font-size: 12px;
  opacity: 0.6;
  margin-bottom: 8px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

#timer {
  font-size: 72px;
  font-weight: 600;
  letter-spacing: 2px;
}
</style>
</head>
<body>

<!-- TOP LEFT -->
<div id="modeControls">
  <button id="autoModeBtn" class="active">automatic</button>
  <button id="manualModeBtn">manual</button>
  <button id="endBreakBtn" style="display:none;">end</button>
</div>

<!-- TOP RIGHT -->
<div id="controls">
  <button id="toggleBtn">ON</button>
  <button id="shortBtn">short</button>
  <button id="longBtn">long</button>
</div>

<div id="container">
  <div id="label"></div>
  <div id="timer"></div>
</div>

<script>
const API_KEY = "AIzaSyBulpufS7w0xT0QjHIlg75Em8TXRAJfNaA";
const CALENDAR_IDS = [
  "7ef01f5b92746221176b2e75d5cda2d674f3242c9cb0d3ef99550ae39fca5cc0@group.calendar.google.com",
  "8e3b8a47e00c54eebac457f3829b01610f2039f05cc6998bfd0334200e80db4d@group.calendar.google.com",
  "bc9094e317604a97236ecd12ed509529b89c702ab5dddf7142aed493f4fd87b5@group.calendar.google.com",
  "f98a845d2d487246693d4bc740c763e8869338b01cf0ee3711c21436200e344d@group.calendar.google.com",
  "4eb78cc9497bd1e1826c06cd2e5fd3ed95e3b416787b519973a7228b7a6712de@group.calendar.google.com",
  "bbbe6f9d786f8f96691c564fb0dd93023c32efc375165a49fa5f43084ce3a945@group.calendar.google.com"
];

let eventStart = null;
let eventEnd = null;
let currentEventId = null;

let isOn = true;
let mode = "short";

let systemMode = "automatic"; // automatic | manual

// Manual system state
let manualStartTime = null;
let manualBreakEnd = null;

// ------------------ MODE SWITCHING ------------------

document.getElementById("autoModeBtn").onclick = () => {
  systemMode = "automatic";
  document.getElementById("autoModeBtn").classList.add("active");
  document.getElementById("manualModeBtn").classList.remove("active");
  document.getElementById("endBreakBtn").style.display = "none";
  resetManualSystem();
};

document.getElementById("manualModeBtn").onclick = () => {
  systemMode = "manual";
  document.getElementById("manualModeBtn").classList.add("active");
  document.getElementById("autoModeBtn").classList.remove("active");
  resetManualSystem();
};

function resetManualSystem() {
  manualStartTime = new Date();
  manualBreakEnd = null;
}

// ------------------ TOP RIGHT BUTTONS ------------------

document.getElementById("toggleBtn").onclick = () => {
  isOn = !isOn;
  document.getElementById("toggleBtn").textContent = isOn ? "ON" : "OFF";
  updateVisibility();
};

document.getElementById("shortBtn").onclick = () => {
  if (systemMode === "automatic") {
    mode = "short";
    updateModeButtons();
  } else {
    startManualBreak(5);
  }
};

document.getElementById("longBtn").onclick = () => {
  if (systemMode === "automatic") {
    mode = "long";
    updateModeButtons();
  } else {
    startManualBreak(10);
  }
};

document.getElementById("endBreakBtn").onclick = () => {
  manualBreakEnd = null;
  document.getElementById("endBreakBtn").style.display = "none";
};

function updateModeButtons() {
  document.getElementById("shortBtn").classList.toggle("active", mode === "short");
  document.getElementById("longBtn").classList.toggle("active", mode === "long");
}

// ------------------ MANUAL SYSTEM ------------------

function startManualBreak(minutes) {
  manualBreakEnd = new Date(Date.now() + minutes * 60000);
  document.getElementById("endBreakBtn").style.display = "inline";
}

// ------------------ FETCH EVENT (Automatic Only) ------------------

async function fetchActiveEvent() {
  if (systemMode !== "automatic") return;

  const now = new Date();
  const timeMin = new Date(now.getTime() - 1 * 60 * 60 * 1000).toISOString();
  const timeMax = new Date(now.getTime() + 12 * 60 * 60 * 1000).toISOString();

  let events = [];

  for (const id of CALENDAR_IDS) {
    const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(id)}/events?key=${API_KEY}&timeMin=${timeMin}&timeMax=${timeMax}&singleEvents=true&orderBy=startTime`;
    try {
      const res = await fetch(url);
      const data = await res.json();
      if (data.items) events = events.concat(data.items);
    } catch (err) {
      console.log("Calendar fetch error:", err);
    }
  }

  const nowTime = new Date();

  const active = events.find(e => {
    if (!e.start.dateTime || !e.end.dateTime) return false;
    const s = new Date(e.start.dateTime);
    const en = new Date(e.end.dateTime);
    return s <= nowTime && nowTime <= en;
  });

  if (active) {
    eventStart = new Date(active.start.dateTime);
    eventEnd = new Date(active.end.dateTime);
    updateVisibility();
  } else {
    eventStart = null;
    eventEnd = null;
    document.getElementById("container").style.display = "none";
  }
}

function updateVisibility() {
  if (!isOn) {
    document.getElementById("container").style.display = "none";
    return;
  }

  if (systemMode === "manual") {
    document.getElementById("container").style.display = "block";
  } else if (eventStart && eventEnd) {
    document.getElementById("container").style.display = "block";
  }
}

// ------------------ TIMER ------------------

function updateTimer() {
  if (!isOn) return;

  const now = new Date();

  // ===== MANUAL MODE =====
  if (systemMode === "manual") {

    if (!manualStartTime) manualStartTime = now;

    if (manualBreakEnd && now < manualBreakEnd) {
      const remaining = manualBreakEnd - now;

      const m = String(Math.floor(remaining / 60000)).padStart(2,"0");
      const s = String(Math.floor((remaining % 60000)/1000)).padStart(2,"0");

      document.getElementById("label").textContent = "MANUAL BREAK";
      document.getElementById("timer").textContent = `${m}:${s}`;
      return;
    }

    if (manualBreakEnd && now >= manualBreakEnd) {
      manualBreakEnd = null;
      document.getElementById("endBreakBtn").style.display = "none";
    }

    // Stopwatch mode
    const elapsed = now - manualStartTime;
    const m = String(Math.floor(elapsed / 60000)).padStart(2,"0");
    const s = String(Math.floor((elapsed % 60000)/1000)).padStart(2,"0");

    document.getElementById("label").textContent = "STOPWATCH";
    document.getElementById("timer").textContent = `${m}:${s}`;
    return;
  }

  // ===== AUTOMATIC MODE =====

  if (!eventStart || !eventEnd) return;
  if (now < eventStart || now > eventEnd) return;

  const totalMinutes = (eventEnd - eventStart) / 60000;
  const elapsedMinutes = (now - eventStart) / 60000;

  const activeLen = mode === "long" ? 54 : 25;
  const breakLen = mode === "long" ? 6 : 5;
  const cycleLen = activeLen + breakLen;

  const cyclePosition = elapsedMinutes % cycleLen;

  let label;
  let remainingSeconds;

  if (cyclePosition < activeLen) {
    label = "ACTIVE";
    remainingSeconds = (activeLen - cyclePosition) * 60;
  } else {
    label = "BREAK";
    remainingSeconds = (cycleLen - cyclePosition) * 60;
  }

  const m = String(Math.floor(remainingSeconds / 60)).padStart(2,"0");
  const s = String(Math.floor(remainingSeconds % 60)).padStart(2,"0");

  document.getElementById("label").textContent =
    label + " • " + (mode === "long" ? "LONG" : "SHORT");

  document.getElementById("timer").textContent = `${m}:${s}`;
}

// ------------------ INIT ------------------

fetchActiveEvent();
setInterval(fetchActiveEvent, 30000);
setInterval(updateTimer, 1000);
updateVisibility();
</script>

</body>
</html>
