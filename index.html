<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin: 0;
  background: #f2f2f2;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  text-align: center;
  color: #111;
}

#leftControls {
  position: absolute;
  top: 12px;
  left: 16px;
  font-size: 12px;
  opacity: 0.7;
}

#rightControls {
  position: absolute;
  top: 12px;
  right: 16px;
  font-size: 12px;
  opacity: 0.7;
}

button {
  border: none;
  background: none;
  font-size: 12px;
  margin-left: 10px;
  cursor: pointer;
}

button.active {
  font-weight: 600;
}

#container {
  display: none;
}

#label {
  font-size: 12px;
  opacity: 0.6;
  margin-bottom: 8px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

#timer {
  font-size: 72px;
  font-weight: 600;
  letter-spacing: 2px;
}
</style>
</head>
<body>

<!-- LEFT -->
<div id="leftControls">
  <button id="automaticBtn" class="active">automatic</button>
  <button id="manualBtn">manual</button>
</div>

<!-- RIGHT -->
<div id="rightControls">
  <button id="shortBtn">short</button>
  <button id="longBtn">long</button>
  <button id="endBreakBtn" style="display:none;">end</button>
  <button id="displayToggleBtn">ON</button>
</div>

<div id="container">
  <div id="label"></div>
  <div id="timer"></div>
</div>

<script>
const API_KEY = "AIzaSyBulpufS7w0xT0QjHIlg75Em8TXRAJfNaA";
const CALENDAR_IDS = [
  "7ef01f5b92746221176b2e75d5cda2d674f3242c9cb0d3ef99550ae39fca5cc0@group.calendar.google.com",
  "8e3b8a47e00c54eebac457f3829b01610f2039f05cc6998bfd0334200e80db4d@group.calendar.google.com",
  "bc9094e317604a97236ecd12ed509529b89c702ab5dddf7142aed493f4fd87b5@group.calendar.google.com",
  "f98a845d2d487246693d4bc740c763e8869338b01cf0ee3711c21436200e344d@group.calendar.google.com",
  "4eb78cc9497bd1e1826c06cd2e5fd3ed95e3b416787b519973a7228b7a6712de@group.calendar.google.com",
  "bbbe6f9d786f8f96691c564fb0dd93023c32efc375165a49fa5f43084ce3a945@group.calendar.google.com"
];

let eventStart = null;
let eventEnd = null;
let displayOn = true;  

let systemMode = "automatic"; // automatic | manual
let autoSplitMode = "short";

// MANUAL MODE STATE
let manualState = "idle"; // idle | break
let manualBreakEnd = null;
let stopwatchStart = new Date();

// ------------------ MODE SWITCH ------------------

document.getElementById("automaticBtn").onclick = () => {
  systemMode = "automatic";
  document.getElementById("automaticBtn").classList.add("active");
  document.getElementById("manualBtn").classList.remove("active");
  document.getElementById("endBreakBtn").style.display = "none";
  fetchActiveEvent(); // force refresh immediately
  updateVisibility();
};

document.getElementById("manualBtn").onclick = () => {
  systemMode = "manual";
  document.getElementById("manualBtn").classList.add("active");
  document.getElementById("automaticBtn").classList.remove("active");

  manualState = "idle";
  stopwatchStart = new Date();
  manualBreakEnd = null;

  updateVisibility();
};

// ------------------ SHORT / LONG BUTTONS ------------------

document.getElementById("shortBtn").onclick = () => {
  if (systemMode === "automatic") {
    autoSplitMode = "short";
  } else {
    startManualBreak(5);
  }
};

document.getElementById("longBtn").onclick = () => {
  if (systemMode === "automatic") {
    autoSplitMode = "long";
  } else {
    startManualBreak(10);
  }
};

document.getElementById("endBreakBtn").onclick = () => {
  endManualBreak();
};

document.getElementById("displayToggleBtn").onclick = () => {
  displayOn = !displayOn;
  document.getElementById("displayToggleBtn").textContent = displayOn ? "ON" : "OFF";
  updateVisibility();
};

// ------------------ MANUAL BREAK ------------------

function startManualBreak(minutes) {
  manualState = "break";
  manualBreakEnd = new Date(Date.now() + minutes * 60000);
  document.getElementById("endBreakBtn").style.display = "inline";
}

function endManualBreak() {
  manualState = "idle";
  manualBreakEnd = null;
  stopwatchStart = new Date(); // RESET stopwatch to 0
  document.getElementById("endBreakBtn").style.display = "none";
}

// ------------------ FETCH EVENT (Automatic Only) ------------------

async function fetchActiveEvent() {
  if (systemMode !== "automatic") return;

  const now = new Date();
  const timeMin = new Date(now.getTime() - 60 * 60 * 1000).toISOString();
  const timeMax = new Date(now.getTime() + 12 * 60 * 60 * 1000).toISOString();

  let events = [];

  for (const id of CALENDAR_IDS) {
    const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(id)}/events?key=${API_KEY}&timeMin=${timeMin}&timeMax=${timeMax}&singleEvents=true&orderBy=startTime`;
    try {
      const res = await fetch(url);
      const data = await res.json();
      if (data.items) events = events.concat(data.items);
    } catch (err) {}
  }

  const nowTime = new Date();

  const active = events.find(e => {
    if (!e.start.dateTime || !e.end.dateTime) return false;
    const s = new Date(e.start.dateTime);
    const en = new Date(e.end.dateTime);
    return s <= nowTime && nowTime <= en;
  });

  if (active) {
    eventStart = new Date(active.start.dateTime);
    eventEnd = new Date(active.end.dateTime);
    updateVisibility();
  } else {
    eventStart = null;
    eventEnd = null;
    document.getElementById("container").style.display = "none";
  }
}

function updateVisibility() {
  if (!displayOn) {
    document.getElementById("container").style.display = "none";
    return;
  }

  if (systemMode === "automatic") {
    document.getElementById("container").style.display =
      eventStart && eventEnd ? "block" : "none";
  } else {
    document.getElementById("container").style.display = "block";
  }
}

// ------------------ TIMER ------------------

function updateTimer() {

  // -------- MANUAL MODE --------
  if (systemMode === "manual") {

    if (manualState === "break") {
      const now = new Date();
      const remaining = manualBreakEnd - now;

      if (remaining <= 0) {
        endManualBreak(); // auto-end + reset stopwatch
        return;
      }

      const m = String(Math.floor(remaining / 60000)).padStart(2, "0");
      const s = String(Math.floor((remaining % 60000) / 1000)).padStart(2, "0");

      document.getElementById("label").textContent = "BREAK";
      document.getElementById("timer").textContent = `${m}:${s}`;
      return;
    }

    // Stopwatch mode
    const now = new Date();
    const elapsed = now - stopwatchStart;

    const m = String(Math.floor(elapsed / 60000)).padStart(2, "0");
    const s = String(Math.floor((elapsed % 60000) / 1000)).padStart(2, "0");

    document.getElementById("label").textContent = "ACTIVE";
    document.getElementById("timer").textContent = `${m}:${s}`;
    return;
  }

  // -------- AUTOMATIC MODE --------

  if (!eventStart || !eventEnd) return;

  const now = new Date();
  if (now < eventStart || now > eventEnd) return;

  const totalMinutes = (eventEnd - eventStart) / 60000;
  const elapsedMinutes = (now - eventStart) / 60000;

  const activeLen = autoSplitMode === "long" ? 54 : 25;
  const breakLen = autoSplitMode === "long" ? 6 : 5;

  const cycleLen = activeLen + breakLen;
  const cyclePosition = elapsedMinutes % cycleLen;

  let label;
  let remainingSeconds;

  if (cyclePosition < activeLen) {
    label = "ACTIVE";
    remainingSeconds = (activeLen - cyclePosition) * 60;
  } else {
    label = "BREAK";
    remainingSeconds = (cycleLen - cyclePosition) * 60;
  }

  remainingSeconds = Math.max(0, remainingSeconds);

  const m = String(Math.floor(remainingSeconds / 60)).padStart(2, "0");
  const s = String(Math.floor(remainingSeconds % 60)).padStart(2, "0");

  document.getElementById("label").textContent =
    label + " • " + autoSplitMode.toUpperCase();

  document.getElementById("timer").textContent = `${m}:${s}`;
}

// ------------------ INIT ------------------

fetchActiveEvent();
setInterval(fetchActiveEvent, 30000);
setInterval(updateTimer, 1000);
</script>

</body>
</html>
