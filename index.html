<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin: 0;
  background: #ececec;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  text-align: center;
  color: #111;
}

#container {
  display: none;
}

#label {
  font-size: 12px;
  opacity: 0.6;
  margin-bottom: 8px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

#timer {
  font-size: 72px;
  font-weight: 600;
  letter-spacing: 2px;
}
</style>
</head>
<body>

<div id="container">
  <div id="label"></div>
  <div id="timer"></div>
</div>

<script>
const API_KEY = "AIzaSyBulpufS7w0xT0QjHIlg75Em8TXRAJfNaA";
const CALENDAR_IDS = [
  "7ef01f5b92746221176b2e75d5cda2d674f3242c9cb0d3ef99550ae39fca5cc0@group.calendar.google.com",
  "8e3b8a47e00c54eebac457f3829b01610f2039f05cc6998bfd0334200e80db4d@group.calendar.google.com",
  "bc9094e317604a97236ecd12ed509529b89c702ab5dddf7142aed493f4fd87b5@group.calendar.google.com",
  "f98a845d2d487246693d4bc740c763e8869338b01cf0ee3711c21436200e344d@group.calendar.google.com",
  "4eb78cc9497bd1e1826c06cd2e5fd3ed95e3b416787b519973a7228b7a6712de@group.calendar.google.com",
  "bbbe6f9d786f8f96691c564fb0dd93023c32efc375165a49fa5f43084ce3a945@group.calendar.google.com"
];

let eventStart = null;
let eventEnd = null;
let mode = "short"; // auto-adjusted later

async function fetchActiveEvent() {
  const now = new Date();
  const timeMin = new Date(now.getTime() - 1 * 60 * 60 * 1000).toISOString();
  const timeMax = new Date(now.getTime() + 12 * 60 * 60 * 1000).toISOString();

  let events = [];

  for (const id of CALENDAR_IDS) {
    const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(id)}/events?key=${API_KEY}&timeMin=${timeMin}&timeMax=${timeMax}&singleEvents=true&orderBy=startTime`;
    try {
      const res = await fetch(url);
      const data = await res.json();
      if (data.items) events = events.concat(data.items);
    } catch (err) {
      console.log("Calendar fetch error:", err);
    }
  }

  const nowTime = new Date();

  const active = events.find(e => {
    if (!e.start.dateTime || !e.end.dateTime) return false;
    const s = new Date(e.start.dateTime);
    const en = new Date(e.end.dateTime);
    return s <= nowTime && nowTime <= en;
  });

  if (active) {
    eventStart = new Date(active.start.dateTime);
    eventEnd = new Date(active.end.dateTime);

    const durationMinutes = (eventEnd - eventStart) / 60000;

    // Auto mode selection
    mode = durationMinutes >= 120 ? "long" : "short";

    document.getElementById("container").style.display = "block";
  } else {
    eventStart = null;
    eventEnd = null;
    document.getElementById("container").style.display = "none";
  }
}

function updateTimer() {
  if (!eventStart || !eventEnd) return;

  const now = new Date();
  if (now < eventStart || now > eventEnd) return;

  const totalMinutes = (eventEnd - eventStart) / 60000;
  const elapsedMinutes = (now - eventStart) / 60000;

  let activeLen, breakLen;

  if (mode === "long") {
    activeLen = 54;
    breakLen = 6;
  } else {
    activeLen = 25;
    breakLen = 5;
  }

  const cycleLen = activeLen + breakLen;
  const fullCycles = Math.floor(totalMinutes / cycleLen);
  const remainder = totalMinutes - fullCycles * cycleLen;

  let isInRemainder = elapsedMinutes >= fullCycles * cycleLen;

  let label;
  let remainingSeconds;

  if (isInRemainder) {
    // Remainder runs fully ACTIVE
    label = "ACTIVE";
    remainingSeconds = (totalMinutes - elapsedMinutes) * 60;
  } else {
    const cyclePosition = elapsedMinutes % cycleLen;

    if (cyclePosition < activeLen) {
      label = "ACTIVE";
      remainingSeconds = (activeLen - cyclePosition) * 60;
    } else {
      label = "BREAK";
      remainingSeconds = (cycleLen - cyclePosition) * 60;
    }
  }

  remainingSeconds = Math.max(0, remainingSeconds);

  const m = String(Math.floor(remainingSeconds / 60)).padStart(2, "0");
  const s = String(Math.floor(remainingSeconds % 60)).padStart(2, "0");

  document.getElementById("label").textContent =
    label + " • " + (mode === "long" ? "LONG MODE" : "SHORT MODE");

  document.getElementById("timer").textContent = `${m}:${s}`;
}

fetchActiveEvent();
setInterval(fetchActiveEvent, 60000);
setInterval(updateTimer, 1000);
</script>

</body>
</html>
